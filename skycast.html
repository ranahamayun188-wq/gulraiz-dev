<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCast — Weather App</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080b10;
    --card: #0e1117;
    --border: #1e2535;
    --accent: #00f5a0;
    --accent2: #00d9f5;
    --text: #e8edf5;
    --muted: #5a6478;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,160,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,217,245,0.08), transparent); top: -100px; right: -100px; animation: floatOrb 8s ease-in-out infinite; }
  .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,245,160,0.06), transparent); bottom: -50px; left: -50px; animation: floatOrb 10s ease-in-out infinite reverse; }
  @keyframes floatOrb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }

  /* HEADER */
  header {
    position: relative; z-index: 1;
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
    border: 1px solid var(--border); padding: 8px 16px;
    transition: all 0.3s; margin-bottom: 28px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .app-title {
    font-size: 2.5rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: -1px;
  }
  .app-sub { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 3px; margin-top: 6px; }

  /* SEARCH */
  .search-wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    margin-bottom: 30px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
  .search-box {
    display: flex; gap: 0;
    border: 1px solid var(--border);
    background: var(--card);
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 1rem;
    padding: 14px 18px;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; padding: 14px 22px;
    font-family: 'Space Mono', monospace; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 1px; color: var(--bg);
    cursor: pointer; transition: opacity 0.2s;
    text-transform: uppercase;
  }
  .search-box button:hover { opacity: 0.85; }

  .quick-cities {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 12px;
  }
  .city-btn {
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    color: var(--muted); border: 1px solid var(--border);
    padding: 5px 12px; background: transparent; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.3s;
  }
  .city-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN CARD */
  .weather-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 32px;
    animation: fadeUp 0.6s ease 0.2s both;
    display: none;
  }
  .weather-card.visible { display: block; }

  .weather-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 28px;
  }
  .city-name { font-size: 1.6rem; font-weight: 800; }
  .city-country { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .weather-date { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; text-align: right; }

  .temp-section {
    display: flex; align-items: center; gap: 20px; margin-bottom: 24px;
    padding-bottom: 24px; border-bottom: 1px solid var(--border);
  }
  .weather-emoji { font-size: 4.5rem; line-height: 1; }
  .temp-main { font-size: 5rem; font-weight: 800; line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .temp-unit { font-size: 2rem; color: var(--muted); }
  .weather-desc { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-top: 4px; text-transform: capitalize; }
  .feels-like { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .stat-item {
    background: var(--bg); border: 1px solid var(--border);
    padding: 14px 10px; text-align: center;
    transition: border-color 0.3s;
  }
  .stat-item:hover { border-color: var(--accent); }
  .stat-item .s-icon { font-size: 1.2rem; margin-bottom: 6px; }
  .stat-item .s-val { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; color: var(--accent); }
  .stat-item .s-lbl { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

  /* FORECAST */
  .forecast-title {
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    color: var(--muted); letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .forecast-day {
    background: var(--bg); border: 1px solid var(--border);
    padding: 12px 6px; text-align: center;
    transition: border-color 0.3s, transform 0.3s;
  }
  .forecast-day:hover { border-color: var(--accent); transform: translateY(-3px); }
  .fc-day { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 6px; }
  .fc-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .fc-temp { font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; color: var(--accent); }
  .fc-low { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  /* LOADING / ERROR */
  .status-msg {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    text-align: center; padding: 40px;
    background: var(--card); border: 1px solid var(--border);
    display: none;
  }
  .status-msg.visible { display: block; }
  .status-msg p { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; }
  .loading-dots span {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin: 0 3px;
    animation: bounce 1.2s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:480px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .forecast-grid { grid-template-columns: repeat(5,1fr); gap:4px; }
    .temp-main { font-size: 3.5rem; }
    .weather-emoji { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <a href="index.html" class="back-btn">← Back to Portfolio</a>
  <div class="app-title">SkyCast</div>
  <div class="app-sub">Real-Time Weather App</div>
</header>

<div class="search-wrapper">
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button onclick="getWeather()">Search</button>
  </div>
  <div class="quick-cities">
    <button class="city-btn" onclick="searchCity('Lahore')">Lahore</button>
    <button class="city-btn" onclick="searchCity('Karachi')">Karachi</button>
    <button class="city-btn" onclick="searchCity('Islamabad')">Islamabad</button>
    <button class="city-btn" onclick="searchCity('London')">London</button>
    <button class="city-btn" onclick="searchCity('Dubai')">Dubai</button>
  </div>
</div>

<div class="status-msg" id="statusMsg">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p id="statusText" style="margin-top:14px;">Fetching weather...</p>
</div>

<div class="weather-card" id="weatherCard">
  <div class="weather-top">
    <div>
      <div class="city-name" id="cityName">—</div>
      <div class="city-country" id="cityCountry">—</div>
    </div>
    <div class="weather-date" id="weatherDate">—</div>
  </div>
  <div class="temp-section">
    <div class="weather-emoji" id="weatherEmoji">🌤️</div>
    <div>
      <div style="display:flex;align-items:flex-start;gap:4px">
        <div class="temp-main" id="tempMain">—</div>
        <div class="temp-unit">°C</div>
      </div>
      <div class="weather-desc" id="weatherDesc">—</div>
      <div class="feels-like" id="feelsLike">—</div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-item"><div class="s-icon">💧</div><div class="s-val" id="humidity">—</div><div class="s-lbl">Humidity</div></div>
    <div class="stat-item"><div class="s-icon">💨</div><div class="s-val" id="wind">—</div><div class="s-lbl">Wind</div></div>
    <div class="stat-item"><div class="s-icon">👁️</div><div class="s-val" id="visibility">—</div><div class="s-lbl">Visibility</div></div>
    <div class="stat-item"><div class="s-icon">🌡️</div><div class="s-val" id="pressure">—</div><div class="s-lbl">Pressure</div></div>
  </div>
  <div class="forecast-title">5-Day Forecast</div>
  <div class="forecast-grid" id="forecastGrid"></div>
</div>

<script>
const API_KEY = 'demo'; // Replace with your OpenWeatherMap API key

const weatherEmojis = {
  'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️',
  'Drizzle': '🌦️', 'Thunderstorm': '⛈️', 'Snow': '❄️',
  'Mist': '🌫️', 'Fog': '🌫️', 'Haze': '🌫️',
  'Dust': '🌪️', 'Smoke': '🌫️', 'default': '🌤️'
};

const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getEmoji(main) { return weatherEmojis[main] || weatherEmojis['default']; }

function showStatus(msg) {
  document.getElementById('statusMsg').classList.add('visible');
  document.getElementById('statusText').textContent = msg;
  document.getElementById('weatherCard').classList.remove('visible');
}

function hideStatus() {
  document.getElementById('statusMsg').classList.remove('visible');
}

function searchCity(city) {
  document.getElementById('cityInput').value = city;
  getWeather();
}

async function getWeather() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;

  showStatus('Fetching weather data...');

  // Demo mode — simulate weather data
  setTimeout(() => {
    const demoData = generateDemoData(city);
    displayWeather(demoData);
  }, 800);

  /* REAL API — uncomment when you have a key:
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`);
    if (!res.ok) throw new Error('City not found');
    const data = await res.json();
    // map to display format
    displayWeather({...});
  } catch(e) {
    showStatus('❌ City not found. Try another name.');
  }
  */
}

function generateDemoData(city) {
  const temps = { lahore:30, karachi:32, islamabad:24, london:14, dubai:38, default:22 };
  const base = temps[city.toLowerCase()] || temps.default;
  const conditions = ['Clear','Clouds','Rain','Drizzle'];
  const cond = conditions[Math.floor(Math.random()*2)];
  const now = new Date();
  return {
    city, country: 'PK',
    temp: base + Math.floor(Math.random()*4-2),
    feels: base - 2,
    desc: cond === 'Clear' ? 'clear sky' : 'partly cloudy',
    main: cond,
    humidity: 55 + Math.floor(Math.random()*30),
    wind: (10 + Math.random()*15).toFixed(1),
    visibility: (8 + Math.random()*4).toFixed(1),
    pressure: 1008 + Math.floor(Math.random()*20),
    date: `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`,
    forecast: Array.from({length:5},(_,i)=>{
      const d = new Date(); d.setDate(d.getDate()+i+1);
      const t = base + Math.floor(Math.random()*8-4);
      const c = conditions[Math.floor(Math.random()*conditions.length)];
      return { day: days[d.getDay()], temp: t, low: t-5, main: c };
    })
  };
}

function displayWeather(d) {
  hideStatus();
  document.getElementById('cityName').textContent = d.city.charAt(0).toUpperCase()+d.city.slice(1);
  document.getElementById('cityCountry').textContent = d.country;
  document.getElementById('weatherDate').textContent = d.date;
  document.getElementById('weatherEmoji').textContent = getEmoji(d.main);
  document.getElementById('tempMain').textContent = Math.round(d.temp);
  document.getElementById('weatherDesc').textContent = d.desc;
  document.getElementById('feelsLike').textContent = `Feels like ${Math.round(d.feels)}°C`;
  document.getElementById('humidity').textContent = d.humidity+'%';
  document.getElementById('wind').textContent = d.wind+' km/h';
  document.getElementById('visibility').textContent = d.visibility+' km';
  document.getElementById('pressure').textContent = d.pressure+' hPa';

  const fg = document.getElementById('forecastGrid');
  fg.innerHTML = d.forecast.map(f=>`
    <div class="forecast-day">
      <div class="fc-day">${f.day}</div>
      <div class="fc-icon">${getEmoji(f.main)}</div>
      <div class="fc-temp">${f.temp}°</div>
      <div class="fc-low">${f.low}°</div>
    </div>`).join('');

  document.getElementById('weatherCard').classList.add('visible');
}

document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') getWeather();
});

// Load default city
searchCity('Lahore');
</script>
</body>
</html>
