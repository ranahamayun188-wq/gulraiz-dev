<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopZone — E-Commerce</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #080b10; --surface: #0e1117; --card: #12161f;
    --border: #1e2535; --accent: #00f5a0; --accent2: #00d9f5;
    --text: #e8edf5; --muted: #5a6478;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }

  body::after {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,245,160,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,245,160,0.03) 1px,transparent 1px);
    background-size:50px 50px; pointer-events:none; z-index:0;
  }

  /* NAV */
  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(8,11,16,0.95); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:16px 40px; display:flex; justify-content:space-between; align-items:center;
  }
  .nav-left { display:flex; align-items:center; gap:20px; }
  .back-btn {
    font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:2px;
    color:var(--muted); text-decoration:none; border:1px solid var(--border);
    padding:7px 14px; transition:all 0.3s; text-transform:uppercase;
  }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }
  .logo { font-family:'Space Mono',monospace; font-size:1.1rem; color:var(--accent); letter-spacing:2px; }
  .logo span { color:var(--text); }

  .nav-right { display:flex; align-items:center; gap:20px; }
  .search-input {
    background:var(--card); border:1px solid var(--border);
    color:var(--text); padding:9px 16px; font-family:'Syne',sans-serif;
    font-size:0.85rem; outline:none; width:200px; transition:border-color 0.3s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .cart-btn {
    position:relative; background:transparent; border:1px solid var(--border);
    color:var(--text); padding:9px 18px; font-family:'Space Mono',monospace;
    font-size:0.75rem; cursor:pointer; letter-spacing:1px; transition:all 0.3s;
    display:flex; align-items:center; gap:8px;
  }
  .cart-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cart-count {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:var(--bg); font-size:0.6rem; font-weight:700;
    width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }

  /* HERO BANNER */
  .hero-banner {
    position:relative; z-index:1;
    background:linear-gradient(135deg,#0a1628,#0d1f3c);
    border-bottom:1px solid var(--border);
    padding:60px 40px; text-align:center; overflow:hidden;
  }
  .hero-banner::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 50%, rgba(0,217,245,0.08) 0%, transparent 70%);
  }
  .hero-tag { font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--accent); letter-spacing:4px; text-transform:uppercase; margin-bottom:14px; }
  .hero-title { font-size:clamp(2rem,5vw,3.5rem); font-weight:800; letter-spacing:-2px; margin-bottom:12px; }
  .hero-title span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hero-sub { color:var(--muted); font-size:1rem; margin-bottom:24px; }
  .hero-cta { display:inline-block; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--bg); padding:13px 32px; font-family:'Space Mono',monospace; font-size:0.78rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; text-decoration:none; transition:transform 0.3s,box-shadow 0.3s; cursor:pointer; border:none; }
  .hero-cta:hover { transform:translateY(-3px); box-shadow:0 0 30px rgba(0,245,160,0.25); }

  /* FILTERS */
  .filters {
    position:relative; z-index:1;
    padding:24px 40px; display:flex; gap:10px; flex-wrap:wrap;
    border-bottom:1px solid var(--border); background:var(--surface);
  }
  .filter-btn {
    font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:2px;
    text-transform:uppercase; padding:8px 18px; background:transparent;
    border:1px solid var(--border); color:var(--muted); cursor:pointer; transition:all 0.3s;
  }
  .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,245,160,0.05); }

  /* PRODUCTS */
  .products-section { position:relative; z-index:1; padding:40px; }
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .section-title { font-size:1.4rem; font-weight:800; }
  .results-count { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--muted); letter-spacing:2px; }

  .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }

  .product-card {
    background:var(--card); border:1px solid var(--border);
    overflow:hidden; transition:border-color 0.3s, transform 0.3s;
    position:relative;
  }
  .product-card:hover { border-color:var(--accent); transform:translateY(-5px); }

  .product-badge {
    position:absolute; top:12px; left:12px; z-index:2;
    font-family:'Space Mono',monospace; font-size:0.55rem; letter-spacing:1px;
    padding:4px 10px; font-weight:700; text-transform:uppercase;
  }
  .badge-new { background:var(--accent); color:var(--bg); }
  .badge-sale { background:#ff5f57; color:#fff; }
  .badge-hot { background:#febc2e; color:var(--bg); }

  .product-img {
    height:200px; background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    font-size:4rem; position:relative; overflow:hidden;
  }
  .product-img::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom, transparent 60%, rgba(8,11,16,0.4));
  }
  .wishlist-btn {
    position:absolute; top:12px; right:12px; z-index:3;
    background:rgba(8,11,16,0.8); border:1px solid var(--border);
    color:var(--muted); width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:0.9rem; transition:all 0.3s;
    border-radius:50%;
  }
  .wishlist-btn:hover, .wishlist-btn.active { border-color:#ff5f57; color:#ff5f57; }

  .product-info { padding:18px; }
  .product-cat { font-family:'Space Mono',monospace; font-size:0.58rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .product-name { font-size:1rem; font-weight:700; margin-bottom:8px; line-height:1.3; }
  .product-rating { display:flex; align-items:center; gap:6px; margin-bottom:12px; }
  .stars { color:#febc2e; font-size:0.75rem; }
  .rating-count { font-family:'Space Mono',monospace; font-size:0.6rem; color:var(--muted); }
  .product-footer { display:flex; justify-content:space-between; align-items:center; }
  .price { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:700; color:var(--accent); }
  .price-old { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); text-decoration:line-through; margin-left:6px; }
  .add-cart {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; color:var(--bg); padding:8px 16px;
    font-family:'Space Mono',monospace; font-size:0.65rem;
    font-weight:700; letter-spacing:1px; cursor:pointer;
    text-transform:uppercase; transition:opacity 0.2s, transform 0.2s;
  }
  .add-cart:hover { opacity:0.85; transform:scale(1.05); }
  .add-cart.added { background:linear-gradient(135deg,#28c840,#00f5a0); }

  /* CART SIDEBAR */
  .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; }
  .cart-overlay.open { display:block; }
  .cart-sidebar {
    position:fixed; top:0; right:-420px; width:400px; height:100vh;
    background:var(--surface); border-left:1px solid var(--border);
    z-index:201; transition:right 0.35s ease;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .cart-sidebar.open { right:0; }
  .cart-header { padding:24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .cart-title { font-size:1.2rem; font-weight:800; }
  .close-cart { background:transparent; border:1px solid var(--border); color:var(--muted); width:34px; height:34px; cursor:pointer; font-size:1.1rem; transition:all 0.3s; }
  .close-cart:hover { border-color:var(--accent); color:var(--accent); }
  .cart-items { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
  .cart-empty { text-align:center; padding:60px 20px; font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); letter-spacing:2px; }
  .cart-item { background:var(--card); border:1px solid var(--border); padding:14px; display:flex; gap:14px; align-items:center; }
  .cart-item-emoji { font-size:2rem; width:50px; text-align:center; }
  .cart-item-info { flex:1; }
  .cart-item-name { font-size:0.9rem; font-weight:700; margin-bottom:4px; }
  .cart-item-price { font-family:'Space Mono',monospace; font-size:0.8rem; color:var(--accent); }
  .remove-item { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:1rem; transition:color 0.2s; }
  .remove-item:hover { color:#ff5f57; }
  .cart-footer { padding:20px; border-top:1px solid var(--border); }
  .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .cart-total-label { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
  .cart-total-amount { font-family:'Space Mono',monospace; font-size:1.3rem; font-weight:700; color:var(--accent); }
  .checkout-btn { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:var(--bg); padding:15px; font-family:'Space Mono',monospace; font-size:0.8rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:opacity 0.2s; }
  .checkout-btn:hover { opacity:0.85; }

  /* TOAST */
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--card); border:1px solid var(--accent);
    color:var(--accent); font-family:'Space Mono',monospace; font-size:0.75rem;
    letter-spacing:1px; padding:12px 24px; z-index:300;
    transition:transform 0.4s ease; white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:768px) {
    nav { padding:14px 16px; }
    .search-input { width:130px; }
    .filters { padding:16px; }
    .products-section { padding:20px 16px; }
    .products-grid { grid-template-columns:repeat(2,1fr); gap:12px; }
    .cart-sidebar { width:100%; right:-100%; }
    .hero-banner { padding:40px 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="portfolio.html" class="back-btn">← Portfolio</a>
    <div class="logo">Shop<span>Zone</span></div>
  </div>
  <div class="nav-right">
    <input class="search-input" type="text" placeholder="Search products..." id="searchInput" oninput="filterProducts()">
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <div class="cart-count" id="cartCount">0</div>
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero-banner">
  <div class="hero-tag">New Collection 2025</div>
  <h1 class="hero-title">Style Meets <span>Technology</span></h1>
  <p class="hero-sub">Discover premium products at unbeatable prices</p>
  <button class="hero-cta" onclick="document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})">Shop Now →</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('footwear',this)">Footwear</button>
  <button class="filter-btn" onclick="setFilter('bags',this)">Bags</button>
  <button class="filter-btn" onclick="setFilter('watches',this)">Watches</button>
  <button class="filter-btn" onclick="setFilter('accessories',this)">Accessories</button>
  <button class="filter-btn" onclick="setFilter('clothing',this)">Clothing</button>
</div>

<!-- PRODUCTS -->
<div class="products-section">
  <div class="section-header">
    <div class="section-title">Featured Products</div>
    <div class="results-count" id="resultsCount">12 Products</div>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <div class="cart-title">Your Cart 🛒</div>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">YOUR CART IS EMPTY<br><br>ADD SOME ITEMS!</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="cartTotal">$0</span>
    </div>
    <button class="checkout-btn" onclick="showToast('🎉 Order Placed Successfully!')">Checkout →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'AirWalk Pro Sneakers', cat:'footwear', emoji:'👟', price:49, oldPrice:79, badge:'sale', rating:4.5, reviews:128 },
  { id:2, name:'Urban Leather Bag', cat:'bags', emoji:'👜', price:89, oldPrice:null, badge:'new', rating:4.8, reviews:64 },
  { id:3, name:'Chronos Smart Watch', cat:'watches', emoji:'⌚', price:129, oldPrice:199, badge:'hot', rating:4.7, reviews:203 },
  { id:4, name:'Aviator Sunglasses', cat:'accessories', emoji:'🕶️', price:35, oldPrice:55, badge:'sale', rating:4.3, reviews:89 },
  { id:5, name:'Street Cap', cat:'clothing', emoji:'🧢', price:22, oldPrice:null, badge:'new', rating:4.2, reviews:45 },
  { id:6, name:'Classic Loafers', cat:'footwear', emoji:'👞', price:65, oldPrice:90, badge:null, rating:4.6, reviews:156 },
  { id:7, name:'Mini Backpack', cat:'bags', emoji:'🎒', price:55, oldPrice:75, badge:'sale', rating:4.4, reviews:78 },
  { id:8, name:'Gold Chain', cat:'accessories', emoji:'📿', price:28, oldPrice:null, badge:'new', rating:4.0, reviews:32 },
  { id:9, name:'Hoodie Luxe', cat:'clothing', emoji:'🧥', price:79, oldPrice:110, badge:'hot', rating:4.9, reviews:312 },
  { id:10, name:'Sandals Pro', cat:'footwear', emoji:'👡', price:42, oldPrice:60, badge:null, rating:4.1, reviews:57 },
  { id:11, name:'Elegant Watch', cat:'watches', emoji:'🕰️', price:159, oldPrice:220, badge:'sale', rating:4.8, reviews:94 },
  { id:12, name:'Tote Bag', cat:'bags', emoji:'👝', price:38, oldPrice:null, badge:'new', rating:4.3, reviews:41 },
];

let cart = [];
let activeFilter = 'all';
let searchQuery = '';
let wishlist = new Set();

function renderProducts() {
  const filtered = products.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });

  document.getElementById('resultsCount').textContent = `${filtered.length} Products`;

  document.getElementById('productsGrid').innerHTML = filtered.map(p => `
    <div class="product-card">
      ${p.badge ? `<div class="product-badge badge-${p.badge}">${p.badge}</div>` : ''}
      <div class="product-img">
        ${p.emoji}
        <button class="wishlist-btn ${wishlist.has(p.id)?'active':''}" onclick="toggleWishlist(${p.id},this)">♥</button>
      </div>
      <div class="product-info">
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">
          <span class="stars">${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5-Math.floor(p.rating))}</span>
          <span class="rating-count">(${p.reviews})</span>
        </div>
        <div class="product-footer">
          <div>
            <span class="price">$${p.price}</span>
            ${p.oldPrice ? `<span class="price-old">$${p.oldPrice}</span>` : ''}
          </div>
          <button class="add-cart" id="btn-${p.id}" onclick="addToCart(${p.id})">Add +</button>
        </div>
      </div>
    </div>`).join('');
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function filterProducts() {
  searchQuery = document.getElementById('searchInput').value;
  renderProducts();
}

function toggleWishlist(id, btn) {
  if(wishlist.has(id)) { wishlist.delete(id); btn.classList.remove('active'); }
  else { wishlist.add(id); btn.classList.add('active'); showToast('❤️ Added to wishlist!'); }
}

function addToCart(id) {
  const p = products.find(x=>x.id===id);
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  updateCart();
  showToast(`✅ ${p.name} added to cart!`);
  const btn = document.getElementById('btn-'+id);
  btn.textContent = 'Added ✓'; btn.classList.add('added');
  setTimeout(()=>{ btn.textContent='Add +'; btn.classList.remove('added'); },1500);
}

function removeFromCart(id) {
  cart = cart.filter(x=>x.id!==id);
  updateCart();
}

function updateCart() {
  const total = cart.reduce((s,x)=>s+x.price*x.qty,0);
  document.getElementById('cartCount').textContent = cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('cartTotal').textContent = '$'+total;
  const ci = document.getElementById('cartItems');
  ci.innerHTML = cart.length ? cart.map(x=>`
    <div class="cart-item">
      <div class="cart-item-emoji">${x.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${x.name} ${x.qty>1?`x${x.qty}`:''}</div>
        <div class="cart-item-price">$${x.price*x.qty}</div>
      </div>
      <button class="remove-item" onclick="removeFromCart(${x.id})">✕</button>
    </div>`).join('') :
    '<div class="cart-empty">YOUR CART IS EMPTY<br><br>ADD SOME ITEMS!</div>';
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

renderProducts();
</script>
</body>
</html>
